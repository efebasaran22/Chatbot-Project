<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSKÜ Soru Cevap Yönetim Paneli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-edit {
            background: #3498db;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            margin-right: 10px;
        }

        .btn-edit:hover {
            background: #2980b9;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
        }

        .qa-list {
            display: grid;
            gap: 20px;
        }

        .qa-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .qa-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .qa-question {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .qa-answer {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .qa-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }

        .qa-category {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }

        .qa-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 MSKÜ Soru Cevap Yönetim Paneli</h1>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Toplam Soru-Cevap</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="categoryCount">0</div>
                <div class="stat-label">Kategori</div>
            </div>
        </div>

        <!-- Alert -->
        <div id="alertBox" style="display: none;"></div>

        <!-- Form Section -->
        <div class="card">
            <h2 id="formTitle">➕ Yeni Soru-Cevap Ekle</h2>
            <form id="qaForm" class="form-section">
                <input type="hidden" id="editId" value="">
                
                <div class="form-group">
                    <label for="question">Soru *</label>
                    <input type="text" id="question" placeholder="Örn: MSKÜ'de kaç fakülte var?" required>
                </div>

                <div class="form-group">
                    <label for="answer">Cevap *</label>
                    <textarea id="answer" placeholder="Sorunun cevabını buraya yazın..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="category">Kategori (İsteğe Bağlı)</label>
                    <input type="text" id="category" placeholder="Örn: Genel Bilgi, Akademik, Yönetmelik">
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">Kaydet</button>
                <button type="button" class="btn" onclick="resetForm()" id="cancelBtn" style="display:none; margin-left: 10px; background: #95a5a6; color: white;">İptal</button>
            </form>
        </div>

        <!-- Search and List Section -->
        <div class="card">
            <h2>📋 Kayıtlı Soru-Cevaplar</h2>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Soru, cevap veya kategoride ara...">
                <button class="btn btn-primary" onclick="searchQA()">Ara</button>
                <button class="btn" onclick="loadAllQA()" style="background: #95a5a6; color: white;">Tümünü Göster</button>
            </div>

            <div id="qaList" class="qa-list">
                <div class="loading">Yükleniyor...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1/qa/';
        let allQAs = [];

        // Load all QA pairs on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadAllQA();
        });

        // Form submit
        document.getElementById('qaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const editId = document.getElementById('editId').value;
            const question = document.getElementById('question').value;
            const answer = document.getElementById('answer').value;
            const category = document.getElementById('category').value || null;

            try {
                let response;
                if (editId) {
                    // Update
                    response = await fetch(`${API_BASE}${editId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question, answer, category })
                    });
                } else {
                    // Create
                    response = await fetch(API_BASE, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question, answer, category })
                    });
                }

                if (response.ok) {
                    showAlert(editId ? 'Soru-cevap güncellendi!' : 'Soru-cevap eklendi!', 'success');
                    resetForm();
                    loadAllQA();
                } else {
                    const error = await response.json();
                    showAlert('Hata: ' + (error.detail || 'Bilinmeyen hata'), 'error');
                }
            } catch (error) {
                showAlert('Bağlantı hatası: ' + error.message, 'error');
            }
        });

        // Load all QA pairs
        async function loadAllQA() {
            try {
                const response = await fetch(API_BASE);
                const data = await response.json();
                allQAs = data.items;
                displayQAs(allQAs);
                updateStats(allQAs);
            } catch (error) {
                document.getElementById('qaList').innerHTML = 
                    '<div class="empty-state">❌ Veriler yüklenemedi: ' + error.message + '</div>';
            }
        }

        // Search QA
        async function searchQA() {
            const query = document.getElementById('searchInput').value;
            if (!query.trim()) {
                loadAllQA();
                return;
            }

            try {
                const response = await fetch(`${API_BASE}?search=${encodeURIComponent(query)}`);
                const data = await response.json();
                displayQAs(data.items);
            } catch (error) {
                showAlert('Arama hatası: ' + error.message, 'error');
            }
        }

        // Display QA pairs
        function displayQAs(qas) {
            const listDiv = document.getElementById('qaList');
            
            if (qas.length === 0) {
                listDiv.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M9 2C7.89543 2 7 2.89543 7 4V20C7 21.1046 7.89543 22 9 22H18C19.1046 22 20 21.1046 20 20V7.41421C20 6.88378 19.7893 6.37507 19.4142 6L16 2.58579C15.6249 2.21071 15.1162 2 14.5858 2H9Z"/>
                        </svg>
                        <h3>Henüz soru-cevap eklenmemiş</h3>
                        <p>Yukarıdaki formdan yeni soru-cevap ekleyebilirsiniz.</p>
                    </div>
                `;
                return;
            }

            listDiv.innerHTML = qas.map(qa => `
                <div class="qa-item">
                    <div class="qa-meta">
                        ${qa.category ? `<span class="qa-category">${qa.category}</span>` : '<span></span>'}
                        <span>🕐 ${new Date(qa.created_at).toLocaleString('tr-TR')}</span>
                    </div>
                    <div class="qa-question">❓ ${qa.question}</div>
                    <div class="qa-answer">💬 ${qa.answer}</div>
                    <div class="qa-actions">
                        <button class="btn btn-edit" onclick="editQA('${qa.id}')">✏️ Düzenle</button>
                        <button class="btn btn-danger" onclick="deleteQA('${qa.id}')">🗑️ Sil</button>
                    </div>
                </div>
            `).join('');
        }

        // Update statistics
        function updateStats(qas) {
            document.getElementById('totalCount').textContent = qas.length;
            const categories = new Set(qas.filter(qa => qa.category).map(qa => qa.category));
            document.getElementById('categoryCount').textContent = categories.size;
        }

        // Edit QA
        function editQA(id) {
            const qa = allQAs.find(q => q.id === id);
            if (!qa) return;

            document.getElementById('editId').value = id;
            document.getElementById('question').value = qa.question;
            document.getElementById('answer').value = qa.answer;
            document.getElementById('category').value = qa.category || '';
            
            document.getElementById('formTitle').textContent = '✏️ Soru-Cevap Düzenle';
            document.getElementById('submitBtn').textContent = 'Güncelle';
            document.getElementById('cancelBtn').style.display = 'inline-block';
            
            // Scroll to form
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Delete QA
        async function deleteQA(id) {
            if (!confirm('Bu soru-cevap çiftini silmek istediğinizden emin misiniz?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showAlert('Soru-cevap silindi!', 'success');
                    loadAllQA();
                } else {
                    showAlert('Silme hatası!', 'error');
                }
            } catch (error) {
                showAlert('Bağlantı hatası: ' + error.message, 'error');
            }
        }

        // Reset form
        function resetForm() {
            document.getElementById('qaForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').textContent = '➕ Yeni Soru-Cevap Ekle';
            document.getElementById('submitBtn').textContent = 'Kaydet';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        // Show alert
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.style.display = 'block';

            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }

        // Search on Enter
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchQA();
            }
        });
    </script>
</body>
</html>
